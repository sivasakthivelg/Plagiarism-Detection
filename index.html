<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiarism Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            margin: 0;
            padding: 0;
        }
        .container {
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }
        .pie-chart-container {
            position: absolute;
            top: 50px;
            left: 20px;
            width: 300px;
            height: 300px;
        }
        button, input[type="file"] {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background: #ff6f61;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #e0554d;
        }
        canvas {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="pie-chart-container">
        <canvas id="pieChart"></canvas>
    </div>
    <div class="container">
        <h1>Plagiarism Detection</h1>
        <form id="plagiarismForm">
            <label>Original File:</label>
            <input type="file" id="originalFile" name="originalFile" accept=".txt"><br>
            <label>Checking File:</label>
            <input type="file" id="checkingFile" name="checkingFile" accept=".txt"><br>
            <button type="submit">Check Similarity</button>
            <button type="button" id="resetButton">Reset</button>
        </form>
        <div id="result" style="margin-top: 20px; font-size: 18px;"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const form = document.getElementById('plagiarismForm');
        const resultDiv = document.getElementById('result');
        const resetButton = document.getElementById('resetButton');
        const pieChartCanvas = document.getElementById('pieChart');
        let pieChart;

        // Function to reset the form and chart
        resetButton.addEventListener('click', () => {
            form.reset();
            resultDiv.innerHTML = '';
            if (pieChart) {
                pieChart.destroy(); // Remove the existing chart
            }
        });

        // Function to render the pie chart
        function renderPieChart(similarity) {
            const data = {
                labels: ['Similarity', 'Difference'],
                datasets: [{
                    data: [similarity, 100 - similarity],
                    backgroundColor: ['#4caf50', '#f44336'],
                    hoverOffset: 4
                }]
            };

            if (pieChart) {
                pieChart.destroy(); // Destroy the old chart if it exists
            }

            pieChart = new Chart(pieChartCanvas, {
                type: 'pie',
                data: data
            });
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);

            try {
                const response = await fetch('/check-plagiarism', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    const similarity = data.similarity; // Similarity percentage
                    resultDiv.innerHTML = `<strong>Similarity:</strong> ${similarity}%`;
                    renderPieChart(similarity);
                } else {
                    const errorData = await response.json();
                    resultDiv.innerHTML = `<span style="color: red;">${errorData.error}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span style="color: red;">An error occurred. Please try again.</span>`;
            }
        });
    </script>
</body>
</html>
